<head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <header>
        <h1><img src="images/favicon.png" alt="icon not found" id="icon_img"> BookHive</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>

            <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Get in Touch</h2>
            <p>Have a question or feedback? We'd love to hear from you.</p>

            <form action="#" method="POST" class="contact-form">

                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <select name="subject" id="subject">
                        <option value="general">General Inquiry</option>
                        <option value="order">Order Issue</option>
                        <option value="suggestion">Book Suggestion</option>
                        <option value="partnership">Partnership</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message *</label>
                    <textarea name="message" id="message" rows="6" placeholder="Tell us what's on your mind..."
                        required></textarea>
                </div>

                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="contact-info">
        <h3>Other Ways to Reach Us</h3>
        <p>✉ Email: <a href="mailto:praveenseducation@gmail.com">hello@bookhive.in</a></p>
        <p>☎ Phone: <a href="tel:+919994411000">+91 99-9441-1000</a></p>
        <p>📍 Address: 123 MG Road, Bengaluru, Karnataka 560001</p>
    </footer>

</body>

</html>
