<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BookHive</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>

    <header>
        <h1><img src="images/favicon.png" alt="icon not found" id="icon_img"> BookHive</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">🛒 Cart </a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Create a Account</h2>
            <p>Join thousands of book lovers on BookHive</p>

            <form action="#" method="POST" class="signup-form">

                <div class="form-group">
                    <label for="fullname">FullName *</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter Your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters"
                        >
                    <small>Must be at least 8 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password *</label>
                    <input type="password" id="confirm-password" name="confirm-password"
                        placeholder="Re-enter your password" >
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <select id="city" name="city">
                        <option value="">-- Select your city --</option>
                        <option value="bengaluru">Bengaluru</option>
                        <option value="mumbai">Mumbai</option>
                        <option value="delhi">Delhi</option>
                        <option value="hyderabad">Hyderabad</option>
                        <option value="chennai">Chennai</option>
                        <option value="pune">Pune</option>
                        <option value="kolkata">Kolkata</option>
                        <option value="erode">Erode</option>
                        <option value="coimbatore">Coimbatore</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" name="dob" id="dob">
                </div>

                <div class="checkbox-group">
                    <p>I'm interested in: (check all the apply)</p>
                    <div class="checkbox-grid">
                        <label><input type="checkbox" name="interests" value="fiction">Fiction</label>
                        <label><input type="checkbox" name="interests" value="education">Education</label>
                        <label><input type="checkbox" name="interests" value="biography">Biographies</label>
                        <label><input type="checkbox" name="interests" value="business">Business</label>
                        <label><input type="checkbox" name="interests" value="children">Children's</label>
                        <label><input type="checkbox" name="interests" value="comics">Comics</label>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" name="terms" id="terms">
                    <label for="terms">I agree to the Terms and Conditions *</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="newletter" name="newsletter">
                    <label for="newsletter">Subscribe to weekly book recomendations</label>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>

                <p class="form-link">
                    Already have an account?
                    <a href="login.html">Login here</a>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 BookHive. All rights reserved.</p>
    </footer>

    <script src="js/signup.js"></script>
</body>

</html>
